# SERVCTL - Cloud / SaaS mode
# Uses PostgreSQL. Supports multi-user with JWT auth.
# Usage: docker compose -f docker-compose.cloud.yml up -d

name: servctl-cloud

services:
  postgres:
    image: postgres:16-alpine
    container_name: servctl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-servctl}
      POSTGRES_USER: ${POSTGRES_USER:-servctl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - servctl-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-servctl}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: servctl-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DEPLOY_MODE: cloud
      SERVCTL_MODE: cloud
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://${POSTGRES_USER:-servctl}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-servctl}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGIN: ${FRONTEND_URL}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_CALLBACK_URL: ${FACEBOOK_CALLBACK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - servctl-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../SERVCTL-FRONT
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_SERVCTL_MODE: cloud
    container_name: servctl-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - servctl-net

volumes:
  postgres-data:
    driver: local
    name: servctl-cloud-postgres

networks:
  servctl-net:
    driver: bridge
    name: servctl-cloud-net
