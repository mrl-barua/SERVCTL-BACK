# Development overrides - hot reload, source mounts
# Automatically used by: docker compose up
# To use production config only:
#   docker compose -f docker-compose.yml up

name: servctl-local

services:
  backend:
    build:
      target: runner
    command:
      ["sh", "-c", "npx prisma migrate deploy || npx prisma db push; npm start"]
    environment:
      NODE_ENV: production
      DEPLOY_MODE: local
      SERVCTL_MODE: local
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://servctl:servctl@postgres:5432/servctl
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:3001,http://localhost:5174}
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    ports:
      - "3000:3000"
      - "9229:9229"

  frontend:
    build:
      context: ../SERVCTL-FRONT
      target: builder
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_SERVCTL_MODE: local
    volumes:
      - ../SERVCTL-FRONT/src:/app/src
      - ../SERVCTL-FRONT/public:/app/public
      - ../SERVCTL-FRONT/index.html:/app/index.html
      - ../SERVCTL-FRONT/vite.config.js:/app/vite.config.js
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
