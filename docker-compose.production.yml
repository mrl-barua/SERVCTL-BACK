# SERVCTL Production Deployment
#
# Prerequisites:
#   1. Copy this file to your server
#   2. Copy .env.production.example to .env and fill in values
#   3. Run: docker compose -f docker-compose.production.yml up -d
#
# Images are pulled from GitHub Container Registry (ghcr.io)
# Frontend image is public - no auth needed
# Backend image is private - requires GHCR_TOKEN in .env

name: servctl

services:
  # -- Backend (NestJS) ----------------------------------
  backend:
    image: ghcr.io/mrl-barua/servctl-backend:${BACKEND_TAG:-latest}
    container_name: servctl-backend
    restart: unless-stopped

    # Pull private image - requires auth
    # Set GHCR_TOKEN in .env (GitHub Personal Access Token
    # with read:packages scope)
    # Run before docker compose up:
    #   echo $GHCR_TOKEN | docker login ghcr.io -u USERNAME --password-stdin

    environment:
      NODE_ENV: production
      PORT: 3000

      # Mode: local (SQLite) or cloud (PostgreSQL)
      SERVCTL_MODE: ${SERVCTL_MODE:-local}

      # Database
      # Local:  DATABASE_URL=file:/app/data/servctl.db
      # Cloud:  DATABASE_URL=postgresql://user:pass@host/db
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/servctl.db}

      # Security - REQUIRED
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}

      # URLs
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}

      # Email (optional - for password reset)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@servctl.dev}

      # SSO OAuth (optional)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_CALLBACK_URL: ${FACEBOOK_CALLBACK_URL:-}

    volumes:
      # SQLite data persistence (local mode)
      - servctl-data:/app/data
      # SSH keys from host (read-only)
      - ${SSH_KEYS_DIR:-~/.ssh}:/home/servctl/.ssh:ro

    ports:
      - "${BACKEND_PORT:-3000}:3000"

    networks:
      - servctl-net

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -- Frontend (nginx + Vue 3) --------------------------
  frontend:
    image: ghcr.io/mrl-barua/servctl-frontend:${FRONTEND_TAG:-latest}
    container_name: servctl-frontend
    restart: unless-stopped

    # Frontend image is PUBLIC - no auth needed

    ports:
      - "${FRONTEND_PORT:-80}:80"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - servctl-net

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # -- PostgreSQL (cloud mode only) ----------------------
  # Uncomment this service if SERVCTL_MODE=cloud
  # and you want a local PostgreSQL instead of Neon/Supabase
  #
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: servctl-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: ${POSTGRES_DB:-servctl}
  #     POSTGRES_USER: ${POSTGRES_USER:-servctl}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - servctl-net
  #   healthcheck:
  #     test: ["CMD-SHELL",
  #            "pg_isready -U ${POSTGRES_USER:-servctl}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  servctl-data:
    driver: local
    name: servctl-data
  # postgres-data:
  #   driver: local
  #   name: servctl-postgres-data

networks:
  servctl-net:
    driver: bridge
    name: servctl-net
