# SERVCTL - Local / Self-hosted mode
# Uses SQLite. No external database required.
# Usage: docker compose up -d

name: servctl-local

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: servctl-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DEPLOY_MODE: local
      SERVCTL_MODE: local
      DATABASE_PROVIDER: sqlite
      DATABASE_URL: file:/app/data/servctl.db
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@servctl.local}
    volumes:
      - servctl-data:/app/data
      - ${SSH_KEYS_DIR:-~/.ssh}:/home/servctl/.ssh:ro
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - servctl-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  servctl-data:
    driver: local
    name: servctl-local-data

networks:
  servctl-net:
    driver: bridge
    name: servctl-local-net
