# SERVCTL - Local / Self-hosted mode
# Uses PostgreSQL in the local Docker network.
# Usage: docker compose up -d

name: servctl-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: servctl-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: servctl
      POSTGRES_PASSWORD: servctl
      POSTGRES_DB: servctl
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - servctl-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servctl -d servctl"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: servctl-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DEPLOY_MODE: local
      SERVCTL_MODE: local
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://servctl:servctl@postgres:5432/servctl
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:3001}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@servctl.local}
    volumes:
      - ${SSH_KEYS_DIR:-~/.ssh}:/home/servctl/.ssh:ro
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - servctl-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres-data:
    driver: local
    name: servctl-local-postgres-data

networks:
  servctl-net:
    driver: bridge
    name: servctl-local-net
